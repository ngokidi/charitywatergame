<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dropy: Clean Water Quest</title>

    <link rel="stylesheet" href="style.css">

    <!-- Charity: water inspired font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <img
            src="img/cw_logo_horizontal.png"
            alt="charity: water logo"
            class="header-logo"
        >

        <h1>Dropy: Clean Water Quest</h1>
        <p>Help deliver clean water and avoid pollution!</p>
    </header>

    <!-- Difficulty Selector -->
    <section class="difficulty-section">
        <label for="difficulty">Choose Difficulty:</label>

        <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="normal" selected>Normal</option>
            <option value="hard">Hard</option>
        </select>
    </section>

    <!-- Score -->
    <section class="game-info">
        <h2>Score: <span id="score">0</span></h2>
        <h3>High Score: <span id="high-score">0</span></h3>
    </section>

    <!-- Progress -->
    <section class="progress-section">
        <p>Journey Progress</p>

        <progress
            id="progress-bar"
            value="0"
            max="5">
        </progress>
    </section>

    <!-- Main Game -->
    <main class="game-board">

        <div class="player">
            <img
                src="img/water-can-transparent.png"
                alt="Water Can"
                id="player-image"
            >
        </div>

        <button class="path" onclick="gainPoints()">
            ➡️ Move Forward
        </button>
        <p>
           Pollution Remaining:
          <span id="trash-count">4</span>
         </p>

        <button class="obstacle" onclick="losePoints(this)">
            🗑️ Remove Trash
        </button>

        <button class="obstacle" onclick="losePoints(this)">
            ☣️ Remove Pollution
        </button>

        <button class="goal" onclick="reachGoal()">
            🚰 Reach Clean Water
        </button>

    </main>
<main class="game-board">

    <div class="player">
        <img
            src="img/water-can-transparent.png"
            alt="Water Can"
            id="player-image"
        >
    </div>

    <p class="instruction">
        Clean up pollution and move toward clean water!
    </p>

    <p>
        Pollution Remaining:
        <span id="trash-count">4</span>
    </p>

    <div class="trash-container">

        <div
            class="trash obstacle-item"
            onclick="cleanTrash(this)">
            🥤
        </div>

        <div
            class="trash obstacle-item"
            onclick="cleanTrash(this)">
            🗑️
        </div>

        <div
            class="trash obstacle-item"
            onclick="cleanTrash(this)">
            🧴
        </div>

        <div
            class="trash obstacle-item"
            onclick="cleanTrash(this)">
            ☣️
        </div>

    </div>

    <button class="path" onclick="gainPoints()">
        ➡️ Move Forward
    </button>

    <div class="goal-water">
        💧💧💧
    </div>

    <button class="goal" onclick="reachGoal()">
        🚰 Reach Clean Water
    </button>

</main>

</body>
</html>
